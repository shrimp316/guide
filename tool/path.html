<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>진리의길 최적경로</title>
  <style>
    :root {
      --bg: #f5f4f0; --surface: #fff; --surface2: #f0efe9;
      --border: #e2e0d8; --text: #1a1917; --text2: #6b6960; --text3: #9b998f;
      --teal: #1D9E75; --teal-light: #E1F5EE; --teal-border: #5DCAA5;
      --radius: 10px; --radius-sm: 6px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', sans-serif, system-ui; background: var(--bg); color: var(--text); font-size: 14px; padding: 16px; min-height: 100vh; }

    h1 { font-size: 18px; font-weight: 700; text-align: center; margin-bottom: 6px; }
    .subtitle { font-size: 12px; color: var(--text2); text-align: center; line-height: 1.5; margin-bottom: 16px; }

    .controls { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; margin-bottom: 14px; }
    .controls-label { font-size: 11px; font-weight: 500; color: var(--text3); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
    .btn-group { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
    .btn { padding: 7px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface2); font-size: 12px; font-family: inherit; color: var(--text2); cursor: pointer; transition: all 0.15s; flex-shrink: 0; }
    .btn:hover { border-color: var(--teal-border); color: var(--teal); }
    .btn.active { background: var(--teal-light); border-color: var(--teal-border); color: #0F6E56; font-weight: 500; }
    .btn-primary { background: var(--teal); color: #fff; border-color: var(--teal); font-weight: 500; width: 100%; padding: 10px; border-radius: var(--radius-sm); font-size: 14px; margin-top: 4px; cursor: pointer; font-family: inherit; border: none; transition: background 0.15s; }
    .btn-primary:hover { background: #0F6E56; }
    .btn-primary:active { transform: scale(0.98); }

    .select-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
    .select-row label { font-size: 12px; color: var(--text2); white-space: nowrap; }
    select { flex: 1; padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); font-size: 13px; font-family: inherit; color: var(--text); outline: none; }

    /* 현재 모드 뱃지 */
    .mode-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--teal-light); border: 1px solid var(--teal-border);
      border-radius: 99px; padding: 4px 12px;
      font-size: 12px; color: #0F6E56; font-weight: 500;
      margin-bottom: 10px;
    }
    .mode-badge-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--teal); }

    /* 그리드 */
    .grids-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
    .grid-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px; }
    .grid-card h3 { font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 8px; text-align: center; }
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; width: 100%; }
    .cell {
      aspect-ratio: 1; background: #E1F5EE; border: 1px solid #c8e6c9;
      cursor: pointer; user-select: none; touch-action: manipulation;
      -webkit-user-select: none; -webkit-touch-callout: none;
      border-radius: 3px; display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 500;
      transition: transform 0.1s;
    }
    .cell.pop { transform: scale(0.82); }
    .cell.obstacle { background: #424242; border-color: #212121; }
    .cell.start { background: #1976D2; border-color: #0d47a1; }
    .cell.end { background: #E64A19; border-color: #bf360c; }
    .cell.path { background: #388E3C !important; border-color: #1b5e20 !important; color: #fff; }
    .cell.grade-2 { background: #bdbdbd; border-color: #9e9e9e; }
    .cell.grade-3 { background: #E1F5EE; border-color: #5DCAA5; }
    .cell.grade-4 { background: #81d4fa; border-color: #0288d1; }
    .cell.grade-5 { background: #fff176; border-color: #f9a825; color: #333; }
    .cell.grade-6 { background: #ce93d8; border-color: #7b1fa2; color: #fff; }

    /* 범례 */
    .legend { display: flex; flex-wrap: wrap; gap: 6px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px; margin-bottom: 14px; }
    .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text2); }
    .legend-dot { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }

    /* 결과 */
    .result-card { background: var(--teal-light); border: 1px solid var(--teal-border); border-radius: var(--radius); padding: 12px; font-size: 13px; color: #0F6E56; font-weight: 500; text-align: center; }

    /* 토스트 */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: #1a1917; color: #fff; padding: 10px 20px;
      border-radius: 99px; font-size: 13px; font-weight: 500;
      z-index: 999; transition: transform 0.25s ease, opacity 0.25s ease;
      opacity: 0; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    @media (min-width: 480px) {
      .grid { gap: 3px; }
      .cell { font-size: 12px; }
      h1 { font-size: 20px; }
    }
  </style>
</head>
<body>

  <h1>진리의길 최적경로</h1>
  <p class="subtitle">시작점·도착점 지정 후 장애물/등급 설정 → 최적 경로 찾기<br>모바일: 길게 눌러 등급 변경 / PC: 우클릭으로 등급 변경</p>

  <div class="controls">
    <div class="controls-label">모드 선택</div>
    <div class="btn-group" id="modeGroup">
      <button class="btn active" onclick="setMode('obstacle')" id="btn-obstacle">장애물</button>
      <button class="btn" onclick="setMode('start')" id="btn-start">시작점</button>
      <button class="btn" onclick="setMode('end')" id="btn-end">도착점</button>
      <button class="btn" onclick="setMode('empty')" id="btn-empty">지우기</button>
    </div>
    <div class="btn-group">
      <button class="btn" onclick="toggleAllowObstacle()" id="obstacleToggle">장애물허용: OFF</button>
      <button class="btn" onclick="resetBoard()">초기화</button>
      <button class="btn" onclick="setAllToGrade(2)">발판 일반</button>
      <button class="btn" onclick="setAllToGrade(3)">발판 고급</button>
    </div>
    <div class="select-row">
      <label>승천 단계</label>
      <select id="multiplierStage">
        <option value="1">1단계 (x1)</option>
        <option value="2">2단계 (x2)</option>
        <option value="3">3단계 (x4)</option>
        <option value="4">4단계 (x8)</option>
      </select>
    </div>
    <button class="btn-primary" onclick="findOptimalPath()">최적 경로 찾기</button>
  </div>

  <!-- 현재 모드 뱃지 -->
  <div class="mode-badge">
    <div class="mode-badge-dot"></div>
    현재 모드: <span id="modeBadgeText">장애물</span>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#424242"></div>장애물</div>
    <div class="legend-item"><div class="legend-dot" style="background:#1976D2"></div>시작</div>
    <div class="legend-item"><div class="legend-dot" style="background:#E64A19"></div>도착</div>
    <div class="legend-item"><div class="legend-dot" style="background:#bdbdbd"></div>일반(1pt)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#E1F5EE;border:1px solid #5DCAA5"></div>고급(2pt)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#81d4fa"></div>희귀(4pt)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#fff176;border:1px solid #f9a825"></div>전설(10pt)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ce93d8"></div>신화(30pt)</div>
  </div>

  <div class="grids-wrap">
    <div class="grid-card">
      <h3>입력창</h3>
      <div class="grid" id="inputGrid"></div>
    </div>
    <div class="grid-card">
      <h3>결과창</h3>
      <div class="grid" id="outputGrid"></div>
    </div>
  </div>

  <div class="result-card" id="totalScore">총합 점수: 0</div>
  <div class="toast" id="toast"></div>

  <script>
    const size = 5;
    const inputGrid = document.getElementById("inputGrid");
    const outputGrid = document.getElementById("outputGrid");
    const board = Array.from({ length: size }, () => Array(size).fill(0));
    let mode = 'obstacle';
    let start = null, end = null;
    let allowObstacle = false;

    const modeLabels = { obstacle:'장애물', start:'시작점', end:'도착점', empty:'지우기' };

    function setMode(newMode) {
      mode = newMode;
      document.querySelectorAll('#modeGroup .btn').forEach(b => b.classList.remove('active'));
      document.getElementById('btn-' + newMode)?.classList.add('active');
      document.getElementById('modeBadgeText').textContent = modeLabels[newMode];
    }

    // 토스트 메시지
    let toastTimer = null;
    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
    }

    // 셀 팝 애니메이션
    function popCell(cell) {
      cell.classList.add('pop');
      setTimeout(() => cell.classList.remove('pop'), 100);
    }

    function toggleAllowObstacle() {
      allowObstacle = !allowObstacle;
      document.getElementById("obstacleToggle").textContent = `장애물허용: ${allowObstacle ? 'ON' : 'OFF'}`;
      showToast(`장애물 허용 ${allowObstacle ? 'ON' : 'OFF'}`);
    }

    function resetBoard() {
      for (let y = 0; y < size; y++) for (let x = 0; x < size; x++) board[y][x] = 0;
      start = null; end = null;
      render(); clearOutput();
      document.getElementById("totalScore").textContent = '총합 점수: 0';
      showToast('초기화 완료');
    }

    function render() {
      [...inputGrid.children].forEach(cell => {
        const x = +cell.dataset.x, y = +cell.dataset.y;
        cell.className = 'cell';
        cell.textContent = '';
        if (start && start[0] === x && start[1] === y) { cell.classList.add('start'); cell.textContent = 'S'; return; }
        if (end && end[0] === x && end[1] === y) { cell.classList.add('end'); cell.textContent = 'E'; return; }
        const val = board[y][x];
        if (val === 1) { cell.classList.add('obstacle'); return; }
        cell.classList.add(val >= 2 ? `grade-${val}` : 'grade-3');
      });
    }

    function isStartOrEnd(x, y) {
      return (start && start[0] === x && start[1] === y) || (end && end[0] === x && end[1] === y);
    }

    const gradeNames = { 3:'고급', 4:'희귀', 5:'전설', 6:'신화' };
    function cycleCellGrade(x, y) {
      if (isStartOrEnd(x, y) || board[y][x] === 1) return;
      board[y][x] = board[y][x] < 3 ? 4 : (board[y][x] >= 6 ? 3 : board[y][x] + 1);
      // 팝 애니메이션
      const idx = y * size + x;
      popCell(inputGrid.children[idx]);
      showToast(`${gradeNames[board[y][x]] ?? '등급'} 설정`);
      render();
    }

    let suppressNextClick = false;
    let suppressNextContextMenu = false;
    let lastLongPressTime = 0;

    for (let y = 0; y < size; y++) {
      for (let x = 0; x < size; x++) {
        const cell = document.createElement("div");
        cell.className = "cell"; cell.dataset.x = x; cell.dataset.y = y;

        cell.onclick = (e) => {
          if (suppressNextClick) { suppressNextClick = false; return; }
          const cx = +cell.dataset.x, cy = +cell.dataset.y;
          if (mode === 'obstacle') {
            if (!isStartOrEnd(cx, cy)) {
              board[cy][cx] = board[cy][cx] === 1 ? 0 : 1;
              popCell(cell);
            }
          } else if (mode === 'start') {
            start = [cx, cy];
            showToast('시작점 설정');
          } else if (mode === 'end') {
            end = [cx, cy];
            showToast('도착점 설정');
          } else if (mode === 'empty') {
            if (start && start[0] === cx && start[1] === cy) start = null;
            if (end && end[0] === cx && end[1] === cy) end = null;
            board[cy][cx] = 0;
            popCell(cell);
          }
          render();
        };

        cell.oncontextmenu = (e) => {
          e.preventDefault();
          if (suppressNextContextMenu || (Date.now() - lastLongPressTime) < 700) {
            suppressNextContextMenu = false; return;
          }
          cycleCellGrade(x, y);
        };

        (() => {
          const LONG_MS = 450, MOVE_TOL = 10;
          let timer = null, triggered = false, sx = 0, sy = 0;
          cell.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) return;
            triggered = false; sx = e.touches[0].clientX; sy = e.touches[0].clientY;
            timer = setTimeout(() => {
              triggered = true; lastLongPressTime = Date.now();
              suppressNextContextMenu = true;
              cycleCellGrade(x, y);
              if (navigator.vibrate) navigator.vibrate(10);
            }, LONG_MS);
          }, { passive: true });
          cell.addEventListener('touchmove', (e) => {
            const t = e.touches[0];
            if (Math.abs(t.clientX - sx) > MOVE_TOL || Math.abs(t.clientY - sy) > MOVE_TOL) clearTimeout(timer);
          }, { passive: true });
          cell.addEventListener('touchend', (e) => {
            clearTimeout(timer);
            if (triggered) { suppressNextClick = true; e.preventDefault(); }
          }, { passive: false });
          cell.addEventListener('touchcancel', () => clearTimeout(timer), { passive: true });
        })();

        inputGrid.appendChild(cell);
        const outputCell = document.createElement("div");
        outputCell.className = "cell"; outputCell.dataset.x = x; outputCell.dataset.y = y;
        outputGrid.appendChild(outputCell);
      }
    }

    function clearOutput() {
      [...outputGrid.children].forEach(cell => { cell.className = "cell"; cell.textContent = ""; });
    }

    function setAllToGrade(grade) {
      for (let y = 0; y < size; y++)
        for (let x = 0; x < size; x++)
          if (!isStartOrEnd(x, y) && board[y][x] !== 1) board[y][x] = grade;
      render();
      showToast(grade === 2 ? '전체 일반 발판 설정' : '전체 고급 발판 설정');
    }

    function getMultiplier() {
      return [1,2,4,8][Number(document.getElementById('multiplierStage').value)-1] ?? 1;
    }

    function getGradeScores() {
      return { 0:2, 1: allowObstacle?0:-999, 2:1, 3:2, 4:4, 5:10, 6:30 };
    }

    function findOptimalPath() {
      if (!start || !end) { showToast('⚠ 시작점과 도착점을 지정하세요'); return; }
      const gradeScores = getGradeScores();
      const visited = Array.from({ length: size }, () => Array(size).fill(false));
      let bestPath = [], bestScore = -Infinity;

      function dfs(x, y, path, score) {
        if (x<0||y<0||x>=size||y>=size||visited[y][x]) return;
        if (!allowObstacle && board[y][x]===1) return;
        let addScore = isStartOrEnd(x,y) ? 0 : (board[y][x]===1 ? 0 : gradeScores[board[y][x]] ?? 0);
        path.push([x,y]); visited[y][x] = true; score += addScore;
        if (x===end[0] && y===end[1]) { if (score>bestScore){bestScore=score;bestPath=[...path];} }
        else for (const [dx,dy] of [[1,0],[0,1],[-1,0],[0,-1]]) dfs(x+dx,y+dy,path,score);
        path.pop(); visited[y][x] = false;
      }

      dfs(start[0], start[1], [], 0);
      clearOutput();

      if (bestPath.length > 0) {
        bestPath.forEach(([x,y], i) => {
          const cell = outputGrid.children[y*size+x];
          cell.classList.add("path"); cell.textContent = i+1;
        });
        const m = getMultiplier();
        const scoreEl = document.getElementById("totalScore");
        scoreEl.textContent = `총합 점수: ${bestScore * m} (배수 x${m})`;
        // 결과창으로 자동 스크롤
        setTimeout(() => scoreEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
        showToast(`✓ 최적 경로 완성 — ${bestScore * m}점`);
      } else {
        showToast('⚠ 경로를 찾을 수 없습니다');
        document.getElementById("totalScore").textContent = `총합 점수: 0 (배수 x${getMultiplier()})`;
      }
    }

    render();
  </script>
</body>
</html>
