<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🏭 제련 비용 계산기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --accent: #f0a500;
    --accent2: #ff6b35;
    --text: #e8eaf0;
    --text-dim: #7a7f99;
    --border: #2e3248;
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 80px 0;
  }

  /* 헤더 */
  header {
    background: linear-gradient(135deg, #1a1d27 0%, #22263a 100%);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  header h1 {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  header .icon { font-size: 20px; }

  /* 탭 */
  .tabs {
    display: flex;
    gap: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .tab-btn {
    flex: 1;
    padding: 12px;
    font-size: 13px;
    font-weight: 600;
    font-family: 'Noto Sans KR', sans-serif;
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    background: rgba(240,165,0,0.05);
  }

  /* 탭 패널 */
  .tab-panel { display: none; padding: 16px; }
  .tab-panel.active { display: block; }

  /* 섹션 제목 */
  .section-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 10px;
    margin-top: 4px;
  }

  /* 재화 카드 그리드 */
  .materials-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .mat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px;
    position: relative;
  }
  .mat-card .mat-name {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .mat-card .mat-hint {
    font-size: 10px;
    color: var(--text-dim);
    opacity: 0.6;
    margin-bottom: 6px;
  }
  .mat-card input[type="number"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 8px;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text);
    text-align: right;
    outline: none;
    -moz-appearance: textfield;
  }
  .mat-card input[type="number"]::-webkit-outer-spin-button,
  .mat-card input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
  .mat-card input[type="number"]:focus {
    border-color: var(--accent);
  }
  .mat-card input[type="number"]:disabled {
    color: var(--text-dim);
    background: var(--surface2);
  }
  .mat-def {
    font-size: 10px;
    color: var(--text-dim);
    text-align: right;
    margin-top: 4px;
  }
  .zero-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 6px;
  }
  .zero-label { font-size: 11px; color: var(--text-dim); }

  /* 토글 스위치 */
  .toggle {
    position: relative;
    width: 34px;
    height: 18px;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute;
    inset: 0;
    background: var(--border);
    border-radius: 18px;
    cursor: pointer;
    transition: 0.2s;
  }
  .toggle-slider:before {
    content: '';
    position: absolute;
    width: 12px; height: 12px;
    left: 3px; top: 3px;
    background: white;
    border-radius: 50%;
    transition: 0.2s;
  }
  .toggle input:checked + .toggle-slider { background: var(--accent2); }
  .toggle input:checked + .toggle-slider:before { transform: translateX(16px); }

  /* 계산 탭 */
  .calc-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
  }

  .select-wrapper {
    position: relative;
    margin-bottom: 12px;
  }
  .select-wrapper::after {
    content: '▾';
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    pointer-events: none;
  }
  select#item {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 36px 12px 12px;
    font-size: 15px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text);
    outline: none;
    appearance: none;
    cursor: pointer;
  }
  select#item:focus { border-color: var(--accent); }

  .count-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }
  .count-label { font-size: 14px; color: var(--text-dim); flex-shrink: 0; }
  .count-row input[type="number"] {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 16px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text);
    text-align: center;
    outline: none;
    -moz-appearance: textfield;
  }
  .count-row input[type="number"]::-webkit-outer-spin-button,
  .count-row input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
  .count-row input[type="number"]:focus { border-color: var(--accent); }

  .count-btn {
    width: 40px; height: 40px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .count-btn:active { background: var(--border); }

  /* 결과 카드 */
  .result-card {
    background: linear-gradient(135deg, rgba(240,165,0,0.1), rgba(255,107,53,0.08));
    border: 1px solid rgba(240,165,0,0.3);
    border-radius: var(--radius);
    padding: 16px;
    text-align: center;
    margin-bottom: 16px;
  }
  .result-label { font-size: 12px; color: var(--text-dim); margin-bottom: 6px; }
  .result-value {
    font-size: 32px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -1px;
  }
  .result-empty { font-size: 16px; color: var(--text-dim); }

  /* 구성표 */
  .recipe-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .recipe-header {
    padding: 10px 14px;
    background: var(--surface2);
    font-size: 12px;
    font-weight: 700;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }
  .recipe-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    font-size: 14px;
  }
  .recipe-row .mat { color: var(--text-dim); }
  .recipe-row .qty { font-weight: 600; color: var(--text); }
  .recipe-row .sub { font-size: 12px; color: var(--accent); font-weight: 600; }
  .recipe-empty {
    padding: 20px;
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
  }

  .home-btn {
    margin-left: auto;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    text-decoration: none;
    font-size: 18px;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .home-btn:active { background: var(--border); }
</style>
</head>
<body>


<header>
  <span class="icon">🏭</span>
  <h1>제련 비용 계산기</h1>
  <a class="home-btn" href="https://sites.google.com/view/brickinc/%ED%99%88" title="홈으로">🏠</a>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('calc')">⚔️ 계산</button>
  <button class="tab-btn" onclick="switchTab('prices')">💰 재화 설정</button>
</div>

<!-- 계산 탭 -->
<div class="tab-panel active" id="tab-calc">
  <div class="calc-section">
    <p class="section-label">품목 선택</p>
    <div class="select-wrapper">
      <select id="item" onchange="calculateTotal()">
        <option value="">-- 선택하세요 --</option>
        <option value="축복의 정수">축복의 정수</option>
        <option value="축복의 정수(부스터)">축복의 정수 (부스터)</option>
        <option value="각성의 돌">각성의 돌</option>
        <option value="마법시계">마법시계</option>
        <option value="마법시계(부스터)">마법시계 (부스터)</option>
        <option value="황금시계">황금시계</option>
        <option value="두루마리">두루마리</option>
        <option value="황금두루마리">황금두루마리</option>
        <option value="지도">지도</option>
        <option value="황금지도">황금지도</option>
        <option value="파멸의 조각">파멸의 조각</option>
        <option value="파멸의 돌">파멸의 돌</option>
        <option value="프리즘 스톤">프리즘 스톤</option>
        <option value="차원 스타">차원 스타</option>
        <option value="프리즘 큐브">프리즘 큐브</option>
      </select>
    </div>

    <p class="section-label">개수</p>
    <div class="count-row">
      <button class="count-btn" onclick="changeCount(-1)">−</button>
      <input type="number" id="count" value="1" min="1" oninput="calculateTotal()">
      <button class="count-btn" onclick="changeCount(1)">＋</button>
    </div>
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-label">총 제련 비용</div>
    <div class="result-empty" id="resultEmpty">품목을 선택하세요</div>
    <div class="result-value" id="resultValue" style="display:none"></div>
  </div>

  <div class="recipe-card">
    <div class="recipe-header">🧾 재료 구성</div>
    <div id="recipeBody">
      <div class="recipe-empty">품목을 선택하면 구성이 표시됩니다</div>
    </div>
  </div>
</div>

<!-- 재화 설정 탭 -->
<div class="tab-panel" id="tab-prices">
  <p class="section-label">재화 단가 설정</p>
  <p style="font-size:12px; color:var(--text-dim); margin-bottom:14px;">비워두면 기본값 사용 · 0처리 토글로 강제 0 설정 가능</p>
  <div class="materials-grid" id="materialsGrid"></div>
</div>

<script>
const defaults = {
  "룬": 0,
  "에테르": 0,
  "마법서": 0.4,
  "부스터": 0.3,
  "프리즘결정": 0,
  "마법시계": 13.2,
  "두루마리": 50,
  "지도": 12,
  "축복의 정수": 40,
  "파멸의 조각": 0,
  "각성의 돌": 220,
  "차원 파편": 0,
  "프리즘 스톤": 600
};

const hints = {
  "룬": "", "에테르": "", "마법서": "기본 0.4",
  "부스터": "기본 0.3", "프리즘결정": "",
  "마법시계": "상점 24", "두루마리": "상점 100",
  "지도": "상점 20", "축복의 정수": "상점 100",
  "파멸의 조각": "상점 50", "각성의 돌": "상점 500",
  "차원 파편": "상점 10", "프리즘 스톤": "상점 1500"
};

const idMap = {
  "룬":"rune","에테르":"ether","마법서":"book","부스터":"booster",
  "프리즘결정":"prism","마법시계":"clock","지도":"map","두루마리":"scroll",
  "축복의 정수":"drink","파멸의 조각":"doom","각성의 돌":"powerst",
  "차원 파편":"demen","프리즘 스톤":"prismst"
};

const recipes = {
  "축복의 정수": { "룬": 500, "에테르": 250, "마법서": 100 },
  "축복의 정수(부스터)": { "부스터": 250 },
  "각성의 돌": { "룬": 1500, "에테르": 1000, "마법서": 550 },
  "마법시계": { "룬": 333.3, "마법서": 33.3 },
  "마법시계(부스터)": { "부스터": 83 },
  "황금시계": { "룬": 10000, "마법서": 250, "마법시계": 15 },
  "지도": { "룬": 200, "에테르": 400, "마법서": 30 },
  "황금지도": { "룬": 15000, "마법서": 550, "지도": 25 },
  "두루마리": { "룬": 10000, "축복의 정수": 0.3, "지도": 1, "마법서": 66.6 },
  "황금두루마리": { "룬": 300000, "두루마리": 5, "마법서": 1500 },
  "파멸의 조각": { "룬": 1000, "마법서": 30, "축복의 정수": 0.2 },
  "파멸의 돌": { "룬": 5000, "프리즘결정": 1500, "파멸의 조각": 15, "각성의 돌": 1 },
  "프리즘 스톤": { "에테르": 50000, "마법서": 1500, "프리즘결정": 2500 },
  "차원 스타": { "룬": 25000, "차원 파편": 50, "프리즘 스톤": 1 },
  "프리즘 큐브": { "프리즘결정": 2500, "프리즘 스톤": 2, "마법서": 2500 }
};

// 재화 설정 카드 생성
function buildMaterialsGrid() {
  const grid = document.getElementById('materialsGrid');
  grid.innerHTML = '';
  for (const [name, defVal] of Object.entries(defaults)) {
    const id = idMap[name];
    const card = document.createElement('div');
    card.className = 'mat-card';
    card.innerHTML = `
      <div class="mat-name" title="${name}">${name}</div>
      ${hints[name] ? `<div class="mat-hint">${hints[name]}</div>` : ''}
      <input type="number" id="user_${id}" step="0.001" placeholder="${defVal}" oninput="calculateTotal()">
      <div class="mat-def">기본: ${defVal}</div>
      <div class="zero-row">
        <span class="zero-label">0 처리</span>
        <label class="toggle">
          <input type="checkbox" class="zero-toggle" data-target="user_${id}" onchange="handleZero(this)">
          <span class="toggle-slider"></span>
        </label>
      </div>
    `;
    grid.appendChild(card);
  }
}

function handleZero(chk) {
  const input = document.getElementById(chk.dataset.target);
  if (chk.checked) { input.value = 0; input.disabled = true; }
  else { input.disabled = false; input.value = ''; }
  calculateTotal();
}

function getPrice(type) {
  const id = idMap[type];
  if (!id) return defaults[type] ?? 0;
  const el = document.getElementById('user_' + id);
  if (!el) return defaults[type] ?? 0;
  return el.value === '' ? (defaults[type] ?? 0) : parseFloat(el.value);
}

function changeCount(delta) {
  const input = document.getElementById('count');
  const val = Math.max(1, (parseInt(input.value) || 1) + delta);
  input.value = val;
  calculateTotal();
}

function calculateTotal() {
  const item = document.getElementById('item').value;
  const count = Math.max(1, parseInt(document.getElementById('count').value) || 1);
  const resultValue = document.getElementById('resultValue');
  const resultEmpty = document.getElementById('resultEmpty');
  const recipeBody = document.getElementById('recipeBody');

  if (!item || !recipes[item]) {
    resultValue.style.display = 'none';
    resultEmpty.style.display = 'block';
    resultEmpty.textContent = '품목을 선택하세요';
    recipeBody.innerHTML = '<div class="recipe-empty">품목을 선택하면 구성이 표시됩니다</div>';
    return;
  }

  const recipe = recipes[item];
  let total = 0;
  let rows = '';

  for (const [mat, qty] of Object.entries(recipe)) {
    const price = getPrice(mat);
    const sub = qty * price * count;
    total += sub;
    rows += `
      <div class="recipe-row">
        <span class="mat">${mat}</span>
        <span class="qty">${qty * count}</span>
        <span class="sub">+${sub.toFixed(3)}</span>
      </div>
    `;
  }

  resultValue.textContent = total.toFixed(3);
  resultValue.style.display = 'block';
  resultEmpty.style.display = 'none';
  recipeBody.innerHTML = rows;
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', (i === 0 && tab === 'calc') || (i === 1 && tab === 'prices'));
  });
  document.getElementById('tab-calc').classList.toggle('active', tab === 'calc');
  document.getElementById('tab-prices').classList.toggle('active', tab === 'prices');
}

buildMaterialsGrid();
</script>

</body>
</html>
