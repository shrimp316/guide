<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>🎲 차원탐사 기대값 계산기</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    body {
      font-family: sans-serif;
      padding: 30px;
      background: #f7f7f7;
    }
    h1 {
      text-align: center;
    }
    label, select, input {
      font-size: 16px;
    }
    .container {
      max-width: 800px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .result {
      margin-top: 20px;
      font-weight: bold;
      background: #e0f7fa;
      padding: 15px;
      border-radius: 8px;
    }
    canvas {
      margin-top: 30px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>🎯 차원탐사 기대값 계산기</h1>
<header>
  <a class="home-btn" href="https://shrmip316.gitgub.io/guide/" title="홈으로">🏠</a>
</header>

    
    <label for="field">필드 선택:</label>
    <select id="field">
      <option value="81">알파 (81칸)</option>
      <option value="81">베타 (81칸)</option>
      <option value="121">감마 (121칸)</option>
      <option value="169">델타 (169칸)</option>
      <option value="225">제타 (225칸)</option>
      <option value="289">세타 (289칸)</option>
      <option value="361">람다 (361칸)</option>
      <option value="441">오미크론 (441칸)</option>
    </select>

    <br><br>
    <label for="remaining">현재 남은 칸 수:</label>
    <input type="number" id="remaining" min="1" max="441" value="1">

    <br><br>
    <label for="cost">시도당 재화 비용:</label>
    <input type="number" id="cost" value="1" min="1">

    <br><br>
    <button onclick="calculate()">계산하기</button>

    <div class="result" id="result"></div>
    <canvas id="chart"></canvas>
    <canvas id="chart2"></canvas>
    <canvas id="probChart"></canvas>
    <canvas id="compareChart"></canvas>
  </div>

  <script>
    function harmonic(n) {
      let h = 0;
      for (let i = 1; i <= n; i++) {
        h += 1 / i;
      }
      return h;
    }

    function cumulativeProbability(p, targetPercent) {
      let cumulative = 0;
      let k = 0;
      while (cumulative < targetPercent) {
        k++;
        cumulative = 1 - Math.pow(1 - p, k);
      }
      return k;
    }

    let chart, chart2, probChart, compareChart;

    function calculate() {
      const total = parseInt(document.getElementById("field").value);
      const cost = parseInt(document.getElementById("cost").value);
      const remaining = parseInt(document.getElementById("remaining").value);
      const fixedCostPerSlot = 43.3 * cost;
      const totalFixedCost = fixedCostPerSlot * remaining;

      if (remaining <= 0 || remaining > total) {
        document.getElementById("result").innerText = "⚠️ 올바른 남은 칸 수를 입력하세요.";
        return;
      }

      const expectedTries = total * harmonic(remaining);
      const expectedCost = expectedTries * cost;
      const expectedPerSlot = total / remaining;

      const strategy = (expectedCost > totalFixedCost)
        ? "✅ <b>확정 강화</b>가 전체적으로 더 유리합니다."
        : "🔁 <b>무작위 시도</b>가 전체적으로 더 유리합니다.";

      document.getElementById("result").innerHTML = `
        🔢 <b>전체 기대 시행 횟수(상위62.3%):</b> ${expectedTries.toFixed(2)}회<br>
        💎 <b>칸당 기대 시행 횟수(상위62.3%):</b> ${expectedPerSlot.toFixed(2)}회<br>
        💰 <b>기대 재화 소모(남은 칸 수 * 기대 시행 횟수):</b> ${expectedCost.toFixed(2)}<br>
        📍 <b>확정 강화 총 비용:</b> ${totalFixedCost.toFixed(2)}<br>
        ${strategy}
      `;

      drawChart(total, cost);
      drawSlotChart(total);
      drawProbabilityChart(total, remaining);
      drawCompareChart(total, cost);
    }

    function drawChart(total, cost) {
      const x = [], y = [];
      for (let r = 1; r <= total; r++) {
        x.push(r);
        y.push((total * harmonic(r)).toFixed(2));
      }
      if (chart) chart.destroy();
      chart = new Chart(document.getElementById("chart"), {
        type: 'line',
        data: {
          labels: x,
          datasets: [{
            label: "남은 칸 수별 전체 기대 시행 횟수",
            data: y,
            borderColor: "#2196f3",
            tension: 0.1,
            fill: false
          }]
        },
        options: {
          scales: {
            x: { title: { display: true, text: "남은 칸 수" } },
            y: { title: { display: true, text: "기대 시행 횟수" } }
          }
        }
      });
    }

    function drawSlotChart(total) {
      const x = [], y = [];
      for (let r = 1; r <= total; r++) {
        x.push(r);
        y.push((total / r).toFixed(2));
      }
      if (chart2) chart2.destroy();
      chart2 = new Chart(document.getElementById("chart2"), {
        type: 'line',
        data: {
          labels: x,
          datasets: [{
            label: "남은 칸 수별 칸당 기대 시행 횟수",
            data: y,
            borderColor: "#f44336",
            tension: 0.1,
            fill: false
          }]
        },
        options: {
          scales: {
            x: { title: { display: true, text: "남은 칸 수" } },
            y: { title: { display: true, text: "칸당 기대 시행 횟수" } }
          }
        }
      });
    }

    function drawProbabilityChart(total, remaining) {
      const percents = [5,10,20,30,40,50,60,70,80,85,90,95,96,97,98,99];
      const trials = percents.map(percent => cumulativeProbability(remaining / total, percent / 100));
      if (probChart) probChart.destroy();
      probChart = new Chart(document.getElementById("probChart"), {
        type: 'line',
        data: {
          labels: percents.map(p => p + "%"),
          datasets: [{
            label: "목표 누적 확률 달성까지 필요한 시행 횟수 (남은 칸 확률 기준)",
            data: trials,
            borderColor: "#4caf50",
            tension: 0.1,
            fill: false
          }]
        },
        options: {
          scales: {
            x: { title: { display: true, text: "획득 누적 확률" } },
            y: { title: { display: true, text: "필요 시행 횟수" } }
          }
        }
      });
    }

    function drawCompareChart(total, cost) {
      const x = [], expectedCosts = [], fixedCosts = [];
      let crossingPoint = null;
      for (let r = 1; r <= total; r++) {
        const expected = total * harmonic(r) * cost;
        const fixed = r * 43.3 * cost;
        x.push(r);
        expectedCosts.push(expected.toFixed(2));
        fixedCosts.push(fixed.toFixed(2));
        if (crossingPoint === null && expected <= fixed) {
          crossingPoint = r;
        }
      }
      if (compareChart) compareChart.destroy();
      const ctx = document.getElementById("compareChart").getContext("2d");
      const datasets = [
        {
          label: "기대 재화 누적 소모",
          data: expectedCosts,
          borderColor: "#3f51b5",
          tension: 0.1,
          fill: false
        },
        {
          label: "확정 강화 누적 비용",
          data: fixedCosts,
          borderColor: "#ff9800",
          tension: 0.1,
          fill: false
        }
      ];
      if (crossingPoint !== null) {
        datasets.push({
          label: "교차 지점",
          data: Array.from({length: total}, (_, i) => i+1 === crossingPoint ? expectedCosts[crossingPoint-1] : null),
          borderColor: "red",
          pointBackgroundColor: "red",
          pointBorderColor: "red",
          pointRadius: 6,
          type: 'line',
          fill: false,
          showLine: false
        });
      }
      compareChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: x,
          datasets: datasets
        },
        options: {
          plugins: {
            legend: { position: 'top' },
            tooltip: { mode: 'index' }
          },
          scales: {
            x: { title: { display: true, text: "남은 칸 수" } },
            y: { title: { display: true, text: "재화 소모량" } }
          }
        }
      });
    }
  </script>

</body>
</html>
